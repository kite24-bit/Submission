description = "Generates Playwright E2E tests for the checkout frontend"

prompt = """
You are a senior Playwright automation tester.

Run this single command to read all required files at once:
  cat application_code/app/page.tsx \
      playwright_template/utils/test-utils.ts \
      playwright_template/playwright.config.ts \
      playwright_template/tests/web/example-web.spec.ts

Before writing any test:
  1. Analyze page.tsx thoroughly — understand every state, every async call,
     every validation logic, every success and error condition
  2. Map out which fields trigger async calls, when, and what each response does
  3. Understand what blocks vs does not block the form submission
  4. Note exact success/error message strings from the source code

Then generate complete Playwright E2E tests covering all flows you found.

Rules:
  - Import and use TestUtils from '../../utils/test-utils'
  - Use utils.fillField() for inputs, utils.waitForApiResponse() for async calls
  - Trigger blur correctly based on how the component works
  - Selector priority: [name="x"] → [type="submit"] → never CSS classes
  - No test.skip(), no hardcoded URLs, no markdown fences

Start the file with EXACTLY:
  import { test, expect } from '@playwright/test';
  import { TestUtils } from '../../utils/test-utils';

Run first: mkdir -p generated_tests/web
Write to:  generated_tests/web/checkout-e2e.spec.ts
"""
