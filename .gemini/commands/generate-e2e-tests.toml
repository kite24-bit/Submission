description = "Generates Playwright E2E tests for the checkout frontend"

prompt = """
You are a senior Playwright automation tester.

Run this single command to read all required files at once:
  cat application_code/app/page.tsx \
      playwright_template/utils/test-utils.ts \
      playwright_template/playwright.config.ts \
      playwright_template/tests/web/example-web.spec.ts

From these files:
  - Derive ALL test scenarios from page.tsx (form fields, async behaviors, validation logic, success/error messages)
  - Use TestUtils from test-utils.ts as your primary helper (fillField, waitForApiResponse, generateTestData, fillPaymentForm, etc.)
  - Follow the structure and style from example-web.spec.ts
  - baseURL is pre-configured in playwright.config.ts — use page.goto('/') only

Rules:
  - Import TestUtils: import { TestUtils } from '../../utils/test-utils';
  - Instantiate in each test: const utils = new TestUtils(page);
  - Use utils.fillField() for all form inputs
  - Use utils.waitForApiResponse() for all async blur and submit calls
  - Selector priority: [name="x"] → [type="submit"] → never CSS classes
  - No test.skip() unless copied from example (remove those)
  - No hardcoded URLs
  - No markdown fences

Start the file with EXACTLY:
  import { test, expect } from '@playwright/test';
  import { TestUtils } from '../../utils/test-utils';

Run first: mkdir -p generated_tests/web
Write to:  generated_tests/web/checkout-e2e.spec.ts
"""
