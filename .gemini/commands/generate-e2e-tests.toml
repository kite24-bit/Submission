description = "Generates Playwright E2E tests for the checkout frontend"

prompt = """
You are a senior Playwright automation tester.

Run this single command to read all required files at once:
  cat application_code/app/page.tsx \
      playwright_template/utils/test-utils.ts \
      playwright_template/tests/web/example-web.spec.ts

Before generating, verify your understanding of page.tsx:
  - What exact text string appears on success?
  - Which validations are blocking vs non-blocking?
  - What selectors are stable for assertions?
  - What attributes do the form inputs have? (name, id, placeholder, label?)

Then in a SINGLE response, generate a complete Playwright E2E test file in TypeScript.
Follow the style and structure of example-web.spec.ts.
Use TestUtils from test-utils.ts as your primary helper.

Generate exactly 3 tests:
  1. Happy path — fill all fields and submit, assert success. Skip per-field validation checks.
  2. Negative test 1 — derived from page.tsx
  3. Negative test 2 — derived from page.tsx

Rules:
  - page.goto('/') only — NEVER absolute URLs
  - Use exact text strings as they appear in page.tsx source code
  - Only assert behaviors that are explicitly implemented in page.tsx
  - All selectors and assertions must resolve to a unique element only and must resolve to be found
  - Never assert transient UI states (loading, processing) — only assert final states
  - Only use selectors that exist in page.tsx — verify before using
  - No test.skip(), no markdown fences
  - Use page.waitForResponse() for ALL async blur validations — no fixed timeouts
  - For success assertion, use page.getByText() with the most specific unique substring from the success message in page.tsx
  - Soft-fail behaviors from page.tsx are intentional — for soft-fail, assert that the form is NOT blocked, not that an error message appears

Start the file with EXACTLY:
  import { test, expect } from '@playwright/test';
  import { TestUtils } from '../../utils/test-utils';

Save the file to: generated_tests/web/checkout-e2e.spec.ts
After writing, stop immediately.
"""
