description = "Generates Playwright E2E tests for the checkout frontend"

prompt = """
<CONTEXT>
Read ONLY necessary files:

- application_code/app/page.tsx
- playwright_template/playwright.config.ts

If needed, read ONLY relevant helper file from:
playwright_template/utils/

Also read GEMINI.md for project context, selector rules, and file paths.
  
DO NOT read all files blindly.
</CONTEXT>

<TASK>
Generate a Playwright E2E test for checkout flow.

Cover ONLY:
1. Happy path (successful checkout)
2. One critical validation error (invalid input)
3. One network failure scenario

Do NOT over-generate.
</TASK>

<OUTPUT_RULES>
  - Use page.waitForResponse() for ALL async blur validations — no fixed timeouts
  - Selector priority: [name="x"] first, [type="submit"] for button, never CSS classes
  - No test.skip(). All scenarios fully implemented.
  - Output ONLY valid TypeScript. Zero markdown fences.
  - Write the file to: generated_tests/web/checkout-e2e.spec.ts
  - Create the directory if needed with: mkdir -p generated_tests/web
</OUTPUT_RULES>
"""
