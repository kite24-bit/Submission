description = "Generates Playwright E2E tests for the checkout frontend"

prompt = """
You are a senior Playwright automation tester.

Run this single command to read all required files at once:
  cat application_code/app/page.tsx \
      playwright_template/utils/test-utils.ts

Generate exactly 3 Playwright E2E tests in TypeScript:
  1. Happy path — fill all fields and submit, Skip per-field validation checks.
  2. Negative test 1 — derived from page.tsx
  3. Negative test 2 — derived from page.tsx

Use TestUtils from test-utils.ts as your primary helper.
Only use Playwright semantic locators — never HTML tags (div, span, p, button, etc.) or CSS classes as selectors or assertions.
All selectors and assertions must resolve to a unique element only.
For async operations, always wait for network response before asserting UI changes.
Soft-fail behaviors from page.tsx are intentional — assert them as-is.

Start the file with EXACTLY:
  import { test, expect } from '@playwright/test';
  import { TestUtils } from '../../utils/test-utils';

Save the file to: generated_tests/web/checkout-e2e.spec.ts
After writing the file, stop immediately. Do not run any commands.
"""
