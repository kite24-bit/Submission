description = "Generates Playwright API tests from the Swagger specification"

prompt = """
You are a senior Playwright automation tester.

Run this single command to read all required files at once:
  cat application_code/docs/swagger.json \
      playwright_template/utils/api-helper.ts \
      playwright_template/tests/api/example-api.spec.ts

In a SINGLE response, generate a complete Playwright API test file in TypeScript.

Follow the style and structure of example-api.spec.ts.
Cover all endpoints from swagger.json.
For each endpoint: assert the response status code from swagger, then validate response body field types only (typeof checks) — never assert exact string values.

Rules:
  - NEVER use absolute URLs — relative paths only
  - No test.skip(), no markdown fences

Start the file with EXACTLY:
  import { test, expect } from '@playwright/test';
  import { ApiHelper } from '../../utils/api-helper';

Run first: mkdir -p generated_tests/api
Write to:  generated_tests/api/payment-api.spec.ts
"""
