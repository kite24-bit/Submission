description = "Generates Playwright API tests from the Swagger specification"

prompt = """
You are a senior Playwright automation tester.

Run this single command to read all required files at once:
  cat application_code/docs/swagger.json \
      playwright_template/playwright.config.ts \
      playwright_template/utils/api-helper.ts

Then generate a complete Playwright API test file in TypeScript.

Rules:
  - Cover ALL endpoints and schemas found in swagger.json
  - For each endpoint: happy-path + negative test
  - baseURL is pre-configured in playwright.config.ts — use relative paths only
  - No hardcoded URLs
  - No test.skip()
  - No markdown fences

Start the file with:
  import { test, expect } from '@playwright/test';
  import { ApiHelper } from '../../utils/api-helper';

Run first: mkdir -p generated_tests/api
Write to:  generated_tests/api/payment-api.spec.ts
"""
