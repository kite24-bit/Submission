description = "Generates Playwright API tests from the Swagger specification"

prompt = """
<CONTEXT>
  Read the Swagger specification by running this shell command:
    cat application_code/docs/swagger.yaml
    cat application_code/docs/swagger.json
  Read the Playwright config file within this shell command:
    cat playwright_template/playwright.config.ts
  Also read GEMINI.md for project context, rules, and file paths.
  And make sure the script is able to run successfully.
</CONTEXT>

<TASK>
  Generate a complete, production-quality Playwright API test file in TypeScript.

  Cover ALL endpoints that is within the application_code/docs/*.json

  and use this application_code/docs/*.yaml as a parameter refernces

  Use schema-aware assertions from the Swagger definitions within the directory application_code/docs/*

  read all the files in this folder playwright_template/utils/* and chose the files related to API testing. And use it as an additional.

</TASK>

<OUTPUT_RULES>
  - Output ONLY valid TypeScript. Zero markdown fences.
  - No test.skip(). Every scenario fully implemented.
  - Write the file to: generated_tests/api/payment-api.spec.ts
  - Create the directory if needed with: mkdir -p generated_tests/api
</OUTPUT_RULES>
"""
