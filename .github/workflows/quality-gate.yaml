name: 🤖 AI Quality Gate — Gemini CLI + Playwright

on:
 
  pull_request:
    # branches: [main, master]
      types: [opened, synchronize]
  issue_comment:
    types: [created]  
    
  # push:
  #   branches: [main, master]
  #   paths-ignore:
  #     - 'generated_test/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — generate
#
# Gemini CLI baca .gemini/commands/*.toml + GEMINI.md
# lalu tulis test files ke generated_test/tests/
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  generate:
    name: 🤖 Generate Tests (Gemini CLI)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      # Checkout PR branch
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      # 2. Detect FORCE command
      - name: Detect force regenerate
        id: force
        run: |
          FORCE=false

          if echo "${{ github.event.pull_request.title}}" | grep -q "/regenerate-tests"; then
              FORCE=true
          fi

          echo "force=$FORCE" >> $GITHUB_OUTPUT

      # 3. Restore cache
      - name: Restore cache
        id: cache
        uses: actions/cache@v4
        with:
          path: .llm_cache
          key: llm-cache-${{ hashFiles(
               'application_code/app/**/*.tsx',
               'application_code/docs/**/*.{json,yaml}',
               '.gemini/commands/*.toml',
               'GEMINI.md'
             ) }}

      # 4. Decide mode (SUPER SIMPLE)
      - name: Decide
        id: decide
        run: |
          if [ "${{ steps.force.outputs.force }}" = "true" ]; then
            echo "mode=force" >> $GITHUB_OUTPUT
          elif [ "${{ steps.cache.outputs.cache-hit }}" = "true" ]; then
            echo "mode=cache" >> $GITHUB_OUTPUT
          elif [ -d "generated_tests" ] && [ "$(ls -A generated_tests)" ]; then
            echo "mode=exists" >> $GITHUB_OUTPUT
          else
            echo "mode=miss" >> $GITHUB_OUTPUT
          fi


      # Generate API tests
      # Gemini baca: GEMINI.md + .toml + cat application_code/docs/swagger.yaml
      # Output: generated_test/tests/api/payment-api.spec.ts
      - name: 🤖 Generate API Tests
        if: steps.decide.outputs.mode == 'force' || steps.decide.outputs.mode == 'miss'
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.PERSONAL_GEMINI_TOKEN }}
          gemini_model: models/gemini-2.5-flash
          prompt: '/generate-api-tests'
        env:
          GEMINI_CLI_TRUST_WORKSPACE: true

      # Generate E2E tests
      # Gemini baca: GEMINI.md + .toml + cat application_code/app/page.tsx
      # Output: generated_test/tests/web/checkout-e2e.spec.ts
      - name: 🤖 Generate E2E Tests
        if: steps.decide.outputs.mode == 'force' || steps.decide.outputs.mode == 'miss'
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.PERSONAL_GEMINI_TOKEN }}
          prompt: '/generate-e2e-tests'
          gemini_model: models/gemini-2.5-flash
        env:
          GEMINI_CLI_TRUST_WORKSPACE: true
          
      - name: Save cache
        if: steps.decide.outputs.mode == 'force' || steps.decide.outputs.mode == 'miss'
        run: |
          mkdir -p .llm_cache
          cp -r generated_tests/* .llm_cache/

      - name: Use cache
        if: steps.decide.outputs.mode == 'cache'
        run: |
          mkdir -p generated_tests
          cp -r .llm_cache/* generated_tests/

      - name: Commit tests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add generated_tests

          git diff --cached --quiet || git commit -m "chore: update generated tests"
          git push
      # Guard: pastikan output Gemini valid sebelum lanjut ke run
      # Cegah hallucination masuk ke test execution
      - name: ✅ Validate generated files
        run: |
          API_FILE="generated_tests/api/payment-api.spec.ts"
          E2E_FILE="generated_tests/web/checkout-e2e.spec.ts"

          for FILE in "$API_FILE" "$E2E_FILE"; do
            echo "--- Checking: $FILE ---"

            [ -f "$FILE" ] \
              || { echo "❌ File tidak ditemukan: $FILE"; exit 1; }

            grep -q "@playwright/test" "$FILE" \
              || { echo "❌ Missing Playwright import di $FILE"; exit 1; }

            grep -qE "test\(|test\.describe\(" "$FILE" \
              || { echo "❌ Tidak ada test() di $FILE"; exit 1; }

            LINES=$(wc -l < "$FILE")
            [ "$LINES" -ge 20 ] \
              || { echo "❌ $FILE terlalu pendek ($LINES baris)"; exit 1; }

            echo "✅ $FILE valid ($LINES baris)"
          done

      # Print ke log CI supaya reviewer bisa inspect output Gemini
      - name: 📄 Print generated tests
        if: always()
        run: |
          echo "========== payment-api.spec.ts =========="
          cat generated_tests/api/payment-api.spec.ts || echo "(not found)"
          echo ""
          echo "========== checkout-e2e.spec.ts =========="
          cat generated_tests/web/checkout-e2e.spec.ts || echo "(not found)"

      # # Upload sebagai artifact untuk dipakai job run-tests
      # - name: Upload generated tests
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: generated-tests
      #     path: generated_test/tests/
      #     retention-days: 7



# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — run-tests
#
# Start Go API + Next.js dari application_code/
# Download generated tests dari job 1
# Run Playwright dari generated_test/
# PR di-block otomatis kalau ada test gagal
# ─────────────────────────────────────────────────────────────────────────────
  run-tests:
    name: 🧪 Run Playwright Tests
    runs-on: ubuntu-latest
    needs: generate
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4


      # ── Setup Go ────────────────────────────────────────────────────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: application_code/go.mod

      # ── Build + Start Go API ─────────────────────────────────────────────
      - name: Start Go API server (:8080)
        working-directory: application_code
        run: |
          go mod download
          go build -o api-server .
          ./api-server &
          echo "API_PID=$!" >> $GITHUB_ENV

          echo "⏳ Menunggu API siap..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:8080/api/health > /dev/null \
              && { echo "✅ API ready"; break; }
            echo "  attempt $i/20..."
            sleep 2
          done

          curl -sf http://localhost:8080/api/health \
            || { echo "❌ API gagal start"; exit 1; }

      # ── Setup Node ───────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: npm
          # cache-dependency-path: |
          #   application_code/package-lock.json
          #   generated_test/package-lock.json

      # ── Build + Start Next.js ────────────────────────────────────────────
      - name: Start Next.js frontend (:3000)
        working-directory: application_code
        run: |
          npm install
          npm run dev &
          echo "NEXT_PID=$!" >> $GITHUB_ENV

          echo "⏳ Menunggu frontend siap..."
          for i in $(seq 1 25); do
            curl -sf http://localhost:3000 > /dev/null \
              && { echo "✅ Frontend ready"; break; }
            echo "  attempt $i/25..."
            sleep 3
          done

          curl -sf http://localhost:3000 \
            || { echo "❌ Frontend gagal start"; exit 1; }

      - name: Move generated tests
        run: |
          rm -rf playwright_template/tests/*
          cp -r generated_tests/* playwright_template/tests/
      # ── Install Playwright ───────────────────────────────────────────────
      - name: Install Playwright
        working-directory: playwright_template
        run: |
          npm install
          npx playwright install
          
      - name: Generate .env
        working-directory: playwright_template
        run: |
          cp .env.example .env
          cat <<EOF > .env
          
          TEST_ENV=staging

          API_SECRET_KEY=${{ secrets.API_SECRET_KEY }}
          STAGING_API_URL=${{ secrets.STAGING_API_URL }}
          
          STAGING_BASE_URL=${{ secrets.STAGING_BASE_URL }}

          TEST_USERNAME=${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD=${{ secrets.TEST_PASSWORD }}

          HEADLESS=true
          TIMEOUT=30000

          GENERATE_REPORT=true
          TAKE_SCREENSHOTS=true
          RECORD_VIDEOS=false
          ENABLE_TRACING=false
          EOF

      # ── Run API Tests ────────────────────────────────────────────────────
      - name: 🧪 Run API Tests
        working-directory: playwright_template
        run: |
          npm run test:api
      # ── Run E2E Tests ────────────────────────────────────────────────────
      - name: 🧪 Run E2E Tests
        working-directory: playwright_template
        run: |
          npm run test:web

      # ── Upload artifacts (selalu, termasuk saat gagal) ───────────────────
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright_template/playwright-report/
          retention-days: 14

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-xml
          path: playwright_template/test-results/results.xml
          retention-days: 14

      - name: Upload screenshots & traces (hanya saat gagal)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-artifacts
          path: playwright_template/test-results/
          retention-days: 7

      # ── Post komentar ke PR ──────────────────────────────────────────────
      - name: Post summary ke PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const ok   = '${{ job.status }}' === 'success';
            const icon = ok ? '✅' : '❌';
            const body = `## ${icon} AI Quality Gate Report`;
            console.log(body);
