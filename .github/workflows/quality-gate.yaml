name: 🤖 AI Quality Gate — Gemini CLI + Playwright

on:
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — generate
#
# Gemini CLI baca .gemini/commands/*.toml + GEMINI.md
# lalu tulis test files ke generated_test/tests/
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  generate:
    name: 🤖 Generate Tests (Gemini CLI)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      # Satu repo = satu checkout, semua sudah ada di dalam
      - name: Checkout repo
        uses: actions/checkout@v4

      # Generate API tests
      # Gemini baca: GEMINI.md + .toml + cat application_code/docs/swagger.yaml
      # Output: generated_test/tests/api/payment-api.spec.ts
      - name: 🤖 Generate API Tests
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.PERSONAL_GEMINI_TOKEN }}
          prompt: '/generate-api-tests'

      # Generate E2E tests
      # Gemini baca: GEMINI.md + .toml + cat application_code/app/page.tsx
      # Output: generated_test/tests/web/checkout-e2e.spec.ts
      - name: 🤖 Generate E2E Tests
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.PERSONAL_GEMINI_TOKEN }}
          prompt: '/generate-e2e-tests'

      # Guard: pastikan output Gemini valid sebelum lanjut ke run
      # Cegah hallucination masuk ke test execution
      - name: ✅ Validate generated files
        run: |
          API_FILE="generated_test/tests/api/payment-api.spec.ts"
          E2E_FILE="generated_test/tests/web/checkout-e2e.spec.ts"

          for FILE in "$API_FILE" "$E2E_FILE"; do
            echo "--- Checking: $FILE ---"

            [ -f "$FILE" ] \
              || { echo "❌ File tidak ditemukan: $FILE"; exit 1; }

            grep -q "@playwright/test" "$FILE" \
              || { echo "❌ Missing Playwright import di $FILE"; exit 1; }

            grep -qE "test\(|test\.describe\(" "$FILE" \
              || { echo "❌ Tidak ada test() di $FILE"; exit 1; }

            LINES=$(wc -l < "$FILE")
            [ "$LINES" -ge 20 ] \
              || { echo "❌ $FILE terlalu pendek ($LINES baris)"; exit 1; }

            echo "✅ $FILE valid ($LINES baris)"
          done

      # Print ke log CI supaya reviewer bisa inspect output Gemini
      - name: 📄 Print generated tests
        if: always()
        run: |
          echo "========== payment-api.spec.ts =========="
          cat generated_test/tests/api/payment-api.spec.ts || echo "(not found)"
          echo ""
          echo "========== checkout-e2e.spec.ts =========="
          cat generated_test/tests/web/checkout-e2e.spec.ts || echo "(not found)"

      # Upload sebagai artifact untuk dipakai job run-tests
      - name: Upload generated tests
        uses: actions/upload-artifact@v4
        with:
          name: generated-tests
          path: generated_test/tests/
          retention-days: 7


# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — run-tests
#
# Start Go API + Next.js dari application_code/
# Download generated tests dari job 1
# Run Playwright dari generated_test/
# PR di-block otomatis kalau ada test gagal
# ─────────────────────────────────────────────────────────────────────────────
  run-tests:
    name: 🧪 Run Playwright Tests
    runs-on: ubuntu-latest
    needs: generate
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Download generated tests dari job 1
      - name: Download generated tests
        uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated_test/tests/

      # ── Setup Go ────────────────────────────────────────────────────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: application_code/go.mod

      # ── Build + Start Go API ─────────────────────────────────────────────
      - name: Start Go API server (:8080)
        working-directory: application_code
        run: |
          go mod download
          go build -o api-server .
          ./api-server &
          echo "API_PID=$!" >> $GITHUB_ENV

          echo "⏳ Menunggu API siap..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:8080/api/health > /dev/null \
              && { echo "✅ API ready"; break; }
            echo "  attempt $i/20..."
            sleep 2
          done

          curl -sf http://localhost:8080/api/health \
            || { echo "❌ API gagal start"; exit 1; }

      # ── Setup Node ───────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            application_code/package-lock.json
            generated_test/package-lock.json

      # ── Build + Start Next.js ────────────────────────────────────────────
      - name: Start Next.js frontend (:3000)
        working-directory: application_code
        run: |
          npm ci
          npm run build
          npm run start &
          echo "NEXT_PID=$!" >> $GITHUB_ENV

          echo "⏳ Menunggu frontend siap..."
          for i in $(seq 1 25); do
            curl -sf http://localhost:3000 > /dev/null \
              && { echo "✅ Frontend ready"; break; }
            echo "  attempt $i/25..."
            sleep 3
          done

          curl -sf http://localhost:3000 \
            || { echo "❌ Frontend gagal start"; exit 1; }

      # ── Install Playwright ───────────────────────────────────────────────
      - name: Install Playwright + Chromium
        working-directory: generated_test
        run: |
          npm ci
          npx playwright install chromium --with-deps

      # ── Run API Tests ────────────────────────────────────────────────────
      - name: 🧪 Run API Tests
        working-directory: generated_test
        env:
          TEST_ENV: staging
          STAGING_API_URL: http://localhost:8080
          STAGING_BASE_URL: http://localhost:3000
          CI: true
        run: |
          npx playwright test --project=api-tests \
            --reporter=list,junit \
            --output=test-results

      # ── Run E2E Tests ────────────────────────────────────────────────────
      - name: 🧪 Run E2E Tests
        working-directory: generated_test
        env:
          TEST_ENV: staging
          STAGING_API_URL: http://localhost:8080
          STAGING_BASE_URL: http://localhost:3000
          CI: true
        run: |
          npx playwright test --project=chromium \
            --reporter=list,junit \
            --output=test-results

      # ── Upload artifacts (selalu, termasuk saat gagal) ───────────────────
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: generated_test/playwright-report/
          retention-days: 14

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-xml
          path: generated_test/test-results/results.xml
          retention-days: 14

      - name: Upload screenshots & traces (hanya saat gagal)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-artifacts
          path: generated_test/test-results/
          retention-days: 7

      # ── Post komentar ke PR ──────────────────────────────────────────────
      - name: Post summary ke PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const ok   = '${{ job.status }}' === 'success';
            const icon = ok ? '✅' : '❌';
            const body = `## ${icon} AI Quality Gate Report
