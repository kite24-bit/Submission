name: 🤖 AI Quality Gate — Gemini CLI + Playwright

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master]

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: generate
#
# Gemini CLI membaca .gemini/commands/*.toml, lalu menjalankan setiap command
# untuk generate API tests dan E2E tests ke generated_test/tests/
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  generate:
    name: 🤖 Gemini — Generate Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Checkout test repo (this repo)
        uses: actions/checkout@v4

      - name: Checkout application repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.APP_REPO }}         # Set di repo Variables: owner/app-repo
          token: ${{ secrets.APP_REPO_TOKEN }}      # PAT jika app repo private
          path: application_code

      # ── Generate API Tests ──────────────────────────────────────────────
      # Gemini CLI membaca .gemini/commands/generate-api-tests.toml
      # + GEMINI.md (project context) → menulis payment-api.spec.ts
      - name: 🤖 Generate API Tests
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: '/generate-api-tests'

      # ── Generate E2E Tests ──────────────────────────────────────────────
      # Gemini CLI membaca .gemini/commands/generate-e2e-tests.toml
      # + GEMINI.md → menulis checkout-e2e.spec.ts
      - name: 🤖 Generate E2E Tests
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: '/generate-e2e-tests'

      # ── Validate generated files ────────────────────────────────────────
      # Guard terhadap hallucination: pastikan output valid sebelum lanjut
      - name: ✅ Validate generated test files
        run: |
          API_FILE="generated_test/tests/api/payment-api.spec.ts"
          E2E_FILE="generated_test/tests/web/checkout-e2e.spec.ts"

          for FILE in "$API_FILE" "$E2E_FILE"; do
            echo "--- Checking: $FILE ---"

            [ -f "$FILE" ] || { echo "❌ Missing: $FILE"; exit 1; }

            grep -q "@playwright/test" "$FILE" \
              || { echo "❌ Missing Playwright import in $FILE"; exit 1; }

            grep -qE "test\(|test\.describe\(" "$FILE" \
              || { echo "❌ No test() calls found in $FILE"; exit 1; }

            LINES=$(wc -l < "$FILE")
            [ "$LINES" -ge 20 ] \
              || { echo "❌ $FILE too short ($LINES lines) — possible hallucination"; exit 1; }

            echo "✅ $FILE OK ($LINES lines)"
          done

      - name: 📄 Print generated files
        run: |
          echo "========== payment-api.spec.ts =========="
          cat generated_test/tests/api/payment-api.spec.ts
          echo ""
          echo "========== checkout-e2e.spec.ts =========="
          cat generated_test/tests/web/checkout-e2e.spec.ts

      - name: Upload generated tests
        uses: actions/upload-artifact@v4
        with:
          name: generated-tests
          path: generated_test/tests/
          retention-days: 7


# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: run-tests
#
# Start Go API + Next.js → download generated tests → run Playwright
# PR di-block otomatis jika ada test yang gagal
# ─────────────────────────────────────────────────────────────────────────────
  run-tests:
    name: 🧪 Run Playwright Tests
    runs-on: ubuntu-latest
    needs: generate
    timeout-minutes: 20

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout test repo
        uses: actions/checkout@v4

      - name: Checkout application repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.APP_REPO }}
          token: ${{ secrets.APP_REPO_TOKEN }}
          path: application_code

      # ── Download generated tests dari Job 1 ──────────────────────────────
      - name: Download generated tests
        uses: actions/download-artifact@v4
        with:
          name: generated-tests
          path: generated_test/tests/

      # ── Setup Go ──────────────────────────────────────────────────────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: application_code/go.mod

      # ── Build & start Go API ──────────────────────────────────────────────
      - name: Start Go API server (:8080)
        working-directory: application_code
        run: |
          go mod download
          go build -o api-server .
          ./api-server &
          echo "API_PID=$!" >> $GITHUB_ENV

          echo "⏳ Waiting for API..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:8080/api/health > /dev/null && \
              { echo "✅ API ready"; break; }
            sleep 2
          done
          curl -sf http://localhost:8080/api/health \
            || { echo "❌ API failed to start"; exit 1; }

      # ── Setup Node ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            application_code/package-lock.json
            generated_test/package-lock.json

      # ── Build & start Next.js ─────────────────────────────────────────────
      - name: Start Next.js frontend (:3000)
        working-directory: application_code
        run: |
          npm ci
          npm run build
          npm run start &
          echo "NEXT_PID=$!" >> $GITHUB_ENV

          echo "⏳ Waiting for frontend..."
          for i in $(seq 1 25); do
            curl -sf http://localhost:3000 > /dev/null && \
              { echo "✅ Frontend ready"; break; }
            sleep 3
          done
          curl -sf http://localhost:3000 \
            || { echo "❌ Frontend failed to start"; exit 1; }

      # ── Install Playwright ────────────────────────────────────────────────
      - name: Install Playwright + Chromium
        working-directory: generated_test
        run: |
          npm ci
          npx playwright install chromium --with-deps

      # ── Run API Tests ─────────────────────────────────────────────────────
      - name: 🧪 Run API Tests
        working-directory: generated_test
        env:
          TEST_ENV: staging
          STAGING_API_URL: http://localhost:8080
          STAGING_BASE_URL: http://localhost:3000
          CI: true
        run: |
          npx playwright test --project=api-tests \
            --reporter=list,junit \
            --output=test-results

      # ── Run E2E Tests ─────────────────────────────────────────────────────
      - name: 🧪 Run E2E Tests
        working-directory: generated_test
        env:
          TEST_ENV: staging
          STAGING_API_URL: http://localhost:8080
          STAGING_BASE_URL: http://localhost:3000
          CI: true
        run: |
          npx playwright test --project=chromium \
            --reporter=list,junit \
            --output=test-results

      # ── Upload artifacts (selalu, bahkan jika gagal) ──────────────────────
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: generated_test/playwright-report/
          retention-days: 14

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-xml
          path: generated_test/test-results/results.xml
          retention-days: 14

      - name: Upload screenshots & traces (only on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-artifacts
          path: generated_test/test-results/
          retention-days: 7

      # ── Post PR comment ───────────────────────────────────────────────────
      - name: Post summary to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const ok   = '${{ job.status }}' === 'success';
            const icon = ok ? '✅' : '❌';
            const body = `## ${icon} AI Quality Gate — Gemini CLI + Playwright

| Step | Status |
|------|--------|
| 🤖 \`/generate-api-tests\` | ✅ Generated |
| 🤖 \`/generate-e2e-tests\` | ✅ Generated |
| ✅ Validation guard | ✅ Passed |
| 🧪 API Tests | ${ok ? '✅ Passed' : '❌ Failed'} |
| 🧪 E2E Tests | ${ok ? '✅ Passed' : '❌ Failed'} |

📊 [Download Playwright HTML Report](../actions/runs/${{ github.run_id }})

> Tests generated by **Gemini CLI** via \`.gemini/commands/*.toml\` reading \`swagger.yaml\` + \`page.tsx\`.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body,
            });

      # ── Cleanup ───────────────────────────────────────────────────────────
      - name: Cleanup servers
        if: always()
        run: |
          kill $API_PID  2>/dev/null || true
          kill $NEXT_PID 2>/dev/null || true
